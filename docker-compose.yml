services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: auth_db,trip_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  auth-service:
    build: ./auth-service
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_db
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  trip-service:
    build: ./trip-service
    environment:
      PORT: 3002
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/trip_db
      REDIS_URL: redis://redis:6379
    volumes:
      - ./trip-service:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  matching-service:
    build: ./matching-service
    environment:
      PORT: 3003
      REDIS_URL: redis://redis:6379
    volumes:
      - ./matching-service:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  location-service:
    build: ./location-service
    environment:
      PORT: 3004
      REDIS_URL: redis://redis:6379
    volumes:
      - ./location-service:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  notification-service:
    build: ./notification-service
    environment:
      PORT: 3005
      REDIS_URL: redis://redis:6379
    volumes:
      - ./notification-service:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  gateway:
    build: ./gateway
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./gateway:/app
      - /app/node_modules
    depends_on:
      - auth-service
      - trip-service
      - matching-service
      - location-service
      - notification-service
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
